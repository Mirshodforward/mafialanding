<svg width="380" height="84" viewBox="0 0 380 84" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mafia Online">
  <defs>
    <linearGradient id="lg-gold" x1="14" y1="16" x2="50" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCE08A"/><stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="lg-ring" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E02244"/><stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
    <radialGradient id="lg-eye" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#FF5C75"/><stop offset="1" stop-color="#C41E3A"/>
    </radialGradient>
    <linearGradient id="lg-word" x1="92" y1="20" x2="360" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0EAD6"/><stop offset="1" stop-color="#FCE08A"/>
    </linearGradient>
  </defs>

  <!-- mark -->
  <g transform="translate(10,10)">
    <circle cx="32" cy="32" r="30" fill="#0F0F18"/>
    <circle cx="32" cy="32" r="30" fill="none" stroke="url(#lg-ring)" stroke-width="2.5"/>
    <ellipse cx="32" cy="46" rx="13" ry="9" fill="#070709"/>
    <ellipse cx="27.2" cy="45" rx="2" ry="1.5" fill="url(#lg-eye)"/>
    <ellipse cx="36.8" cy="45" rx="2" ry="1.5" fill="url(#lg-eye)"/>
    <path d="M21.5 39 L23.4 25.5 Q24.2 19.5 32 18.8 Q39.8 19.5 40.6 25.5 L42.5 39 Z" fill="url(#lg-gold)"/>
    <rect x="21" y="35.4" width="22" height="4" rx="1" fill="#C41E3A"/>
    <ellipse cx="32" cy="40" rx="23" ry="5.4" fill="url(#lg-gold)"/>
    <ellipse cx="32" cy="41.3" rx="23" ry="4" fill="#000000" opacity="0.15"/>
  </g>

  <!-- wordmark -->
  <text x="90" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="700" letter-spacing="2" fill="url(#lg-word)">MAFIA</text>
  <text x="90" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" letter-spacing="6.5" fill="#D4AF37">ONLINE</text>
