<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mafia Online">
  <defs>
    <linearGradient id="gold" x1="14" y1="16" x2="50" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCE08A"/>
      <stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="ring" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E02244"/>
      <stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
    <radialGradient id="eye" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#FF5C75"/>
      <stop offset="1" stop-color="#C41E3A"/>
    </radialGradient>
  </defs>

  <!-- badge -->
  <circle cx="32" cy="32" r="30" fill="#0F0F18"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#ring)" stroke-width="2.5"/>

  <!-- hidden face shadow under the brim -->
  <ellipse cx="32" cy="46" rx="13" ry="9" fill="#070709"/>
  <!-- glowing eyes -->
  <ellipse cx="27.2" cy="45" rx="2" ry="1.5" fill="url(#eye)"/>
  <ellipse cx="36.8" cy="45" rx="2" ry="1.5" fill="url(#eye)"/>

  <!-- fedora crown -->
  <path d="M21.5 39 L23.4 25.5 Q24.2 19.5 32 18.8 Q39.8 19.5 40.6 25.5 L42.5 39 Z" fill="url(#gold)"/>
  <!-- crown shading -->
  <path d="M32 18.8 Q39.8 19.5 40.6 25.5 L42.5 39 L32 39 Z" fill="#000000" opacity="0.12"/>
  <!-- hatband -->
  <rect x="21" y="35.4" width="22" height="4" rx="1" fill="#C41E3A"/>
  <rect x="21" y="35.4" width="22" height="1.6" rx="0.8" fill="#7F1322" opacity="0.6"/>
  <!-- brim -->
  <ellipse cx="32" cy="40" rx="23" ry="5.4" fill="url(#gold)"/>
  <ellipse cx="32" cy="41.3" rx="23" ry="4" fill="#000000" opacity="0.15"/>
  <!-- highlight -->
  <path d="M25 24 Q28 20.5 33 20.4" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.4" stroke-linecap="round" fill="none"/>
</svg>
