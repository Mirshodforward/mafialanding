<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="og-gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FCE08A"/><stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="og-ring" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E02244"/><stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
    <radialGradient id="og-eye" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#FF5C75"/><stop offset="1" stop-color="#C41E3A"/>
    </radialGradient>
    <radialGradient id="og-bg1" cx="0.2" cy="0.15" r="0.5">
      <stop stop-color="#C41E3A" stop-opacity="0.32"/><stop offset="1" stop-color="#C41E3A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-bg2" cx="0.85" cy="0.9" r="0.5">
      <stop stop-color="#7C3AED" stop-opacity="0.26"/><stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-word" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F4EFE0"/><stop offset="1" stop-color="#FCE08A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0A0A0F"/>
  <rect width="1200" height="630" fill="url(#og-bg1)"/>
  <rect width="1200" height="630" fill="url(#og-bg2)"/>
  <rect x="20" y="20" width="1160" height="590" rx="28" fill="none" stroke="#2D2D3D" stroke-width="2"/>

  <!-- emblem -->
  <g transform="translate(120,175) scale(4.2)">
    <circle cx="32" cy="32" r="30" fill="#0F0F18"/>
    <circle cx="32" cy="32" r="30" fill="none" stroke="url(#og-ring)" stroke-width="2.5"/>
    <ellipse cx="32" cy="46" rx="13" ry="9" fill="#070709"/>
    <ellipse cx="27.2" cy="45" rx="2" ry="1.5" fill="url(#og-eye)"/>
    <ellipse cx="36.8" cy="45" rx="2" ry="1.5" fill="url(#og-eye)"/>
    <path d="M21.5 39 L23.4 25.5 Q24.2 19.5 32 18.8 Q39.8 19.5 40.6 25.5 L42.5 39 Z" fill="url(#og-gold)"/>
    <rect x="21" y="35.4" width="22" height="4" rx="1" fill="#C41E3A"/>
    <ellipse cx="32" cy="40" rx="23" ry="5.4" fill="url(#og-gold)"/>
    <ellipse cx="32" cy="41.3" rx="23" ry="4" fill="#000000" opacity="0.15"/>
  </g>

  <!-- text -->
  <text x="470" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="800" letter-spacing="3" fill="url(#og-word)">MAFIA</text>
  <text x="472" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="800" letter-spacing="20" fill="#D4AF37">ONLINE</text>
  <text x="474" y="392" font-family="Arial, Helvetica, sans-serif" font-size="29" fill="#9CA3AF">Onlayn Mafiya — do'stlaring bilan, real vaqtda</text>

  <!-- role tokens row -->
  <g>
    <circle cx="492" cy="452" r="17" fill="#0F0F18" stroke="#D4AF37" stroke-width="2.5"/>
    <circle cx="540" cy="452" r="17" fill="#0F0F18" stroke="#C41E3A" stroke-width="2.5"/>
    <circle cx="588" cy="452" r="17" fill="#0F0F18" stroke="#2563EB" stroke-width="2.5"/>
    <circle cx="636" cy="452" r="17" fill="#0F0F18" stroke="#16A34A" stroke-width="2.5"/>
    <circle cx="684" cy="452" r="17" fill="#0F0F18" stroke="#9333EA" stroke-width="2.5"/>
    <circle cx="732" cy="452" r="17" fill="#0F0F18" stroke="#EC4899" stroke-width="2.5"/>
    <text x="762" y="459" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#6B7280">+13 rol</text>
  </g>

  <!-- play pill -->
  <rect x="472" y="500" width="330" height="62" rx="31" fill="url(#og-ring)"/>
  <text x="637" y="540" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#FFFFFF">▶  game.mafiaonline.uz</text>
